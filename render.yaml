services:
  - type: web
    name: mycandleaf-server-express-ts
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm start
    port: 8080

    envVars:
      - key: NODE_ENV
        value: production

    autoDeploy: true


    healthCheckPath: /api/v1/health

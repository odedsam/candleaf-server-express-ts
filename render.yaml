services:
  - type: web
    name: candleaf-back
    env: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm && pnpm install && pnpm run build
    startCommand: node dist/index.js
    port: 8080
    envVars:
      - key: NODE_ENV
        value: production
    autoDeploy: true
    healthCheckPath: /api/v1/health

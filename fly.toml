
# See fly.toml.template for more information.

app = "candleaf-server-express-ts" # Change this to your actual app name on Fly.io
primary_region = "fra" # Change this to your preferred primary region (e.g., "lhr" for London)

[build]
  # Fly.io will automatically detect Node.js and use buildpacks.
  # If you have a custom Dockerfile, you might specify it here:
  # dockerfile = "./Dockerfile"
  # Or if you have build arguments:
  # args = { NODE_VERSION = "20" }

[processes]
  # This defines the command to start your application.
  # It corresponds to "deploy.startCommand": "pnpm start" in railway.json
  app = "pnpm start"

[[services]]
  # This section defines how your app is exposed to the internet.
  internal_port = 8080 # The port your Express app listens on inside the container
  protocol = "tcp"

  # These settings help manage machine lifecycle and can be seen as
  # a more granular equivalent to "sleepApplication" and "numReplicas".
  # It ensures at least one machine is always running (min_machines_running = 1)
  # but allows scaling down when idle and scaling up when needed.
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # Corresponds to numReplicas: 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true # Enforce HTTPS, good practice

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Define concurrency settings if needed.
  # [services.concurrency]
  #   type = "connections"
  #   hard_limit = 25
  #   soft_limit = 20
